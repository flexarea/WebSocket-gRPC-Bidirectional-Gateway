apiVersion: apps/v1
kind: Deployment
metadata:
  name: xchat-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xchat-gateway
  template:
    metadata:
      labels:
        app: xchat-gateway
    spec:
      containers:
      - name: xchat-gateway
        image: xchat-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: xchat-gateway
spec:
  selector:
    app: xchat-gateway
  ports:
  - port: 8080
    targetPort: 8080
