syntax = "proto3";

package message;

option go_package = "xchat.io/message/proto";

service Message {
        rpc HandleMessage (stream chatMessage) returns (stream chatMessage);
}

message chatMessage {
        string content = 1;
        int32 src_user_id = 2;
        int32 dest_user_id = 3;
        int64 timestamp = 4;
}
