syntax = "proto3";

package message;

option go_package = "xchat.io/message/proto";

service Message {
	rpc HandleMessage (MessageRequest) returns (MessageReply);
}

message MessageRequest {
	string content = 1;
	int32 src_user_id = 2;
	int32 dest_user_id = 3;
}

message MessageReply {
	string content = 1;
	int32 src_user_id = 2;
	int32 dest_user_id = 3;
}

